<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Euchre Score Keeper</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#0f172a; color:white; margin:0; padding:20px;}
.card { background:#1f2937; padding:15px; border-radius:12px; margin-bottom:15px;}
.players { display:grid; grid-template-columns:repeat(2,1fr); gap:10px;}
.player { padding:10px; background:#111827; border-radius:10px; cursor:pointer;}
.player.dealer { outline:3px solid orange;}
button { padding:10px; border-radius:10px; border:none; font-weight:bold; cursor:pointer;}
.controls { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:10px;}
.history { max-height:300px; overflow:auto;}
input { width:100%; padding:8px; border-radius:8px; border:none; margin-top:5px;}
.section-title { margin-top:10px; font-weight:bold;}
</style>
</head>

<body>

<h2>Euchre Score Keeper</h2>
<a href="https://bicyclecards.com/how-to-play/euchre/" target="_blank" style="color:#60a5fa;">Rules</a>

<div class="card">
<h3>Teams</h3>
<input id="team1Name" placeholder="Team 1">
<input id="team2Name" placeholder="Team 2">
</div>

<div class="card">
<h3>Players (click to set dealer)</h3>
<div class="players" id="players"></div>
</div>

<div class="card">
<h3>Round Actions</h3>
<div class="controls">
<button onclick="callTrump(0)">T1 Call Trump</button>
<button onclick="callTrump(1)">T2 Call Trump</button>
<button onclick="alone(0)">T1 Alone</button>
<button onclick="alone(1)">T2 Alone</button>
</div>
</div>

<div class="card">
<h3>Score</h3>
<div id="scoreText"></div>

<div class="controls">
<button onclick="add(0,1)">+1</button>
<button onclick="add(1,1)">+1</button>
<button onclick="add(0,2)">+2</button>
<button onclick="add(1,2)">+2</button>
<button onclick="add(0,4)">+4</button>
<button onclick="add(1,4)">+4</button>
</div>

<div class="controls">
<button onclick="turnDown()">Turn Down</button>
<button onclick="undo()">Undo</button>
<button onclick="resetAll()">Reset</button>
</div>
</div>

<div class="card">
<h3>History</h3>
<div class="history" id="history"></div>
</div>

<script>
const KEY="euchre_v3";

function load(){
  return JSON.parse(localStorage.getItem(KEY)) || {
    names:["P1","P2","P3","P4"],
    dealer:0,
    score:[0,0],
    games:[0,0],
    teamNames:["Team 1","Team 2"],
    history:[],
    undo:[]
  };
}

let state=load();

function save(){ localStorage.setItem(KEY,JSON.stringify(state)); }

function snapshot(){
  state.undo.push(JSON.stringify(state));
}

function teamLabel(i){
  return state.teamNames[i] || ("Team "+(i+1));
}

function setDealer(i){
  snapshot();
  state.dealer=i;
  log("Dealer set to "+state.names[i]);
  save(); render();
}

function rotateDealer(){
  state.dealer=(state.dealer+1)%4;
}

function add(team,pts){
  snapshot();

  let oldDealer=state.names[state.dealer];

  state.score[team]+=pts;
  rotateDealer();

  let msg=`${teamLabel(team)} +${pts}. Dealer ${oldDealer} → ${state.names[state.dealer]}`;

  if(state.score[team]>=10){
    state.games[team]++;
    msg+=" | GAME WON";
    state.score=[0,0];
  }

  log(msg);
  save(); render();
}

function callTrump(team){
  snapshot();
  log(`${teamLabel(team)} called trump`);
  save(); render();
}

function alone(team){
  snapshot();
  log(`${teamLabel(team)} is going alone`);
  save(); render();
}

function turnDown(){
  snapshot();
  log("Turned down by dealer: "+state.names[state.dealer]);
  save(); render();
}

function undo(){
  if(!state.undo.length) return;
  state=JSON.parse(state.undo.pop());
  save(); render();
}

function resetAll(){
  if(!confirm("Reset everything?")) return;
  localStorage.removeItem(KEY);
  state=load();
  render();
}

function log(msg){
  state.history.unshift(new Date().toLocaleTimeString()+" - "+msg);
}

function rename(i,val){
  snapshot();
  state.names[i]=val||("P"+(i+1));
  save();
}

function setTeamName(i,val){
  snapshot();
  state.teamNames[i]=val||("Team "+(i+1));
  save();
}

function render(){
  document.getElementById("players").innerHTML="";
  state.names.forEach((n,i)=>{
    let div=document.createElement("div");
    div.className="player"+(i===state.dealer?" dealer":"");
    div.innerHTML=`<input value="${n}" onchange="rename(${i},this.value)">`;
    div.onclick=()=>setDealer(i);
    document.getElementById("players").appendChild(div);
  });

  document.getElementById("team1Name").value=state.teamNames[0];
  document.getElementById("team2Name").value=state.teamNames[1];

  document.getElementById("team1Name").onchange=(e)=>setTeamName(0,e.target.value);
  document.getElementById("team2Name").onchange=(e)=>setTeamName(1,e.target.value);

  document.getElementById("scoreText").innerHTML=
    `${teamLabel(0)}: ${state.score[0]} (Games ${state.games[0]})<br>
     ${teamLabel(1)}: ${state.score[1]} (Games ${state.games[1]})`;

  document.getElementById("history").innerHTML=
    state.history.map(h=>"<div>"+h+"</div>").join("");
}

render();
</script>

</body>
</html>
