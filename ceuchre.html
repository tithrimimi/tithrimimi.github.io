<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Euchre Score Keeper</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#0f172a; color:white; margin:0; padding:20px;}
.card { background:#1f2937; padding:15px; border-radius:12px; margin-bottom:15px;}
.players { display:grid; grid-template-columns:repeat(2,1fr); gap:10px;}
.player { padding:10px; background:#111827; border-radius:10px; cursor:pointer;}
.player.dealer { outline:3px solid orange;}
button { padding:10px; border-radius:10px; border:none; font-weight:bold; cursor:pointer;}
.controls { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:10px;}
.history { max-height:300px; overflow:auto;}
input { width:100%; padding:8px; border-radius:8px; border:none; margin-top:5px;}
</style>
</head>

<body>

<h2>Euchre Score Keeper</h2>
<a href="https://bicyclecards.com/how-to-play/euchre/" target="_blank" style="color:#60a5fa;">Rules</a>

<div class="card">
<h3>Players (click to set dealer)</h3>
<div class="players" id="players"></div>
</div>

<div class="card">
<h3>Score</h3>
<div>Team 1: <span id="t1">0</span> | Games: <span id="g1">0</span></div>
<div>Team 2: <span id="t2">0</span> | Games: <span id="g2">0</span></div>

<div class="controls">
<button onclick="add(0,1)">T1 +1</button>
<button onclick="add(1,1)">T2 +1</button>
<button onclick="add(0,2)">T1 +2</button>
<button onclick="add(1,2)">T2 +2</button>
<button onclick="add(0,4)">T1 +4</button>
<button onclick="add(1,4)">T2 +4</button>
</div>

<div class="controls">
<button onclick="turnDown()">Turn Down</button>
<button onclick="undo()">Undo</button>
<button onclick="resetAll()">Reset</button>
</div>
</div>

<div class="card">
<h3>History</h3>
<div class="history" id="history"></div>
</div>

<script>
const KEY="euchre_v2";

function load(){
  return JSON.parse(localStorage.getItem(KEY)) || {
    names:["P1","P2","P3","P4"],
    dealer:0,
    score:[0,0],
    games:[0,0],
    history:[],
    undo:[]
  };
}

let state=load();

function save(){ localStorage.setItem(KEY,JSON.stringify(state)); }

function snapshot(){
  state.undo.push(JSON.stringify(state));
}

function setDealer(i){
  snapshot();
  state.dealer=i;
  log("Dealer manually set to "+state.names[i]);
  save(); render();
}

function rotateDealer(){
  state.dealer=(state.dealer+1)%4;
}

function add(team,pts){
  snapshot();

  let oldDealer=state.names[state.dealer];

  state.score[team]+=pts;
  rotateDealer();

  let msg=`T${team+1} +${pts}. Dealer ${oldDealer} → ${state.names[state.dealer]}`;

  if(state.score[team]>=10){
    state.games[team]++;
    msg+=" | GAME WON";
    state.score=[0,0];
  }

  log(msg);
  save(); render();
}

function turnDown(){
  snapshot();
  log("Turned down by dealer: "+state.names[state.dealer]);
  save(); render();
}

function undo(){
  if(!state.undo.length) return;
  state=JSON.parse(state.undo.pop());
  save(); render();
}

function resetAll(){
  if(!confirm("Reset everything?")) return;
  localStorage.removeItem(KEY);
  state=load();
  render();
}

function log(msg){
  state.history.unshift(new Date().toLocaleTimeString()+" - "+msg);
}

function render(){
  document.getElementById("players").innerHTML="";
  state.names.forEach((n,i)=>{
    let div=document.createElement("div");
    div.className="player"+(i===state.dealer?" dealer":"");
    div.innerHTML=`<input value="${n}" onchange="rename(${i},this.value)">`;
    div.onclick=()=>setDealer(i);
    document.getElementById("players").appendChild(div);
  });

  document.getElementById("t1").textContent=state.score[0];
  document.getElementById("t2").textContent=state.score[1];
  document.getElementById("g1").textContent=state.games[0];
  document.getElementById("g2").textContent=state.games[1];

  document.getElementById("history").innerHTML=
    state.history.map(h=>"<div>"+h+"</div>").join("");
}

function rename(i,val){
  snapshot();
  state.names[i]=val||("P"+(i+1));
  save();
}

render();
</script>

</body>
</html>
